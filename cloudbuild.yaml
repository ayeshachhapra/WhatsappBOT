steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/watracker/watracker:$BUILD_ID
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/watracker/watracker:latest
      - .
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/watracker/watracker:$BUILD_ID
  - us-central1-docker.pkg.dev/$PROJECT_ID/watracker/watracker:latest
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
